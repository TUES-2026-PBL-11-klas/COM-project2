apiVersion: v1
kind: Service
metadata:
  name: pm-api
  namespace: pm-project
  labels:
    app: pm-api
spec:
  # Change type to LoadBalancer if you want to expose externally on a cloud cluster,
  # or NodePort for minikube access via node IP.
  type: ClusterIP
  selector:
    app: pm-api
  ports:
    - name: http
      protocol: TCP
      port: 5130
      targetPort: 5130
