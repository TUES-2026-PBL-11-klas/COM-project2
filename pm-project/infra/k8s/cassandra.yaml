apiVersion: apps/v1
kind: Deployment
metadata:
  name: cassandra-db
  namespace: pm-project
  labels:
    app: cassandra-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cassandra-db
  template:
    metadata:
      labels:
        app: cassandra-db
    spec:
      containers:
        - name: cassandra
          image: cassandra:latest
          ports:
            - containerPort: 9042
          env:
            - name: CASSANDRA_CLUSTER_NAME
              value: "PMCluster"
            - name: MAX_HEAP_SIZE
              value: "512M"
            - name: HEAP_NEWSIZE
              value: "128M"
          readinessProbe:
            exec:
              command: ["cqlsh", "-u", "cassandra", "-p", "cassandra", "-e", "describe keyspaces"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["cqlsh", "-u", "cassandra", "-p", "cassandra", "-e", "describe keyspaces"]
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: cassandra-db
  namespace: pm-project
  labels:
    app: cassandra-db
spec:
  type: ClusterIP
  selector:
    app: cassandra-db
  ports:
    - name: cql
      protocol: TCP
      port: 9042
      targetPort: 9042
