name: Mobile CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'pm-project/mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'pm-project/mobile/**'
      - '.github/workflows/mobile-ci.yml'

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pm-project/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pm-project/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint --if-present
 
